name: Build Tweak

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]  # Trigger when you push a tag like v1.0.1
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  build:
    name: Build YTGestures
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        run: brew install ldid xz

      - name: Setup Theos
        run: git clone --recursive https://github.com/theos/theos.git ${{ github.workspace }}/theos

      - name: Setup iOS SDKs
        run: |
          rm -rf ${{ github.workspace }}/theos/sdks
          git clone https://github.com/theos/sdks.git ${{ github.workspace }}/theos/sdks

      - name: Build Package
        run: |
          make clean
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          cp packages/*.deb output/
          
          # Use wildcards to find the plist and dylib regardless of case or minor name changes
          cp *.plist output/ 2>/dev/null || true
          
          # Find the dylib in the build folder - look for YTGestures.dylib
          if [ -f .theos/obj/YTGestures.dylib ]; then
            cp .theos/obj/YTGestures.dylib output/
          elif [ -f .theos/obj/debug/YTGestures.dylib ]; then
            cp .theos/obj/debug/YTGestures.dylib output/
          elif [ -d .theos/obj ]; then
             # Fallback: catch any dylib generated if the name differs slightly
             find .theos/obj -name "*.dylib" -exec cp {} output/ \;
          fi

      - name: Generate Release Tag
        id: tag
        run: |
          VERSION=$(grep '^Version:' control | awk '{print $2}')
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

- name: Publish to GitHub Releases
        # This 'if' check ensures a release is ONLY created if a tag was pushed
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YTGestures ${{ github.ref_name }}
          files: output/*
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
